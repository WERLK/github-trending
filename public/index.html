<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 每日热点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .last-update {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .repo-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .repo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .repo-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0366d6;
            margin-bottom: 12px;
            text-decoration: none;
        }

        .repo-name:hover {
            text-decoration: underline;
        }

        .repo-description {
            color: #586069;
            margin-bottom: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .repo-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #586069;
            font-size: 0.9rem;
        }

        .language {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .stars { color: #f1c40f; }
        .forks { color: #3498db; }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 60px 20px;
        }

        .error {
            text-align: center;
            color: white;
            background: rgba(231, 76, 60, 0.9);
            padding: 30px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 GitHub 每日热点</h1>
            <div class="last-update" id="lastUpdate">加载中...</div>
        </header>
        <div id="content"></div>
    </div>

    <script>
        const languageColors = {
            'JavaScript': '#f1e05a',
            'TypeScript': '#3178c6',
            'Python': '#3572A5',
            'Java': '#b07219',
            'Go': '#00ADD8',
            'Rust': '#dea584',
            'C++': '#f34b7d',
            'C': '#555555',
            'Ruby': '#701516',
            'PHP': '#4F5D95',
            'Swift': '#ffac45',
            'Kotlin': '#F18E33',
            'Dart': '#00B4AB',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'Vue': '#41b883',
            'Shell': '#89e051'
        };

        async function loadTrending() {
            const contentDiv = document.getElementById('content');
            const lastUpdateDiv = document.getElementById('lastUpdate');

            try {
                const response = await fetch('/data/trending.json');
                const data = await response.json();

                lastUpdateDiv.textContent = `最后更新: ${new Date(data.fetched_at).toLocaleString('zh-CN')}`;

                const reposHtml = data.repos.map(repo => {
                    const langColor = languageColors[repo.language] || '#858585';
                    return `
                        <div class="repo-card">
                            <a href="${repo.url}" target="_blank" class="repo-name">${repo.name}</a>
                            <p class="repo-description">${repo.description || '暂无描述'}</p>
                            <div class="repo-meta">
                                ${repo.language ? `
                                    <div class="meta-item">
                                        <span class="language" style="background-color: ${langColor}"></span>
                                        ${repo.language}
                                    </div>
                                ` : ''}
                                <div class="meta-item stars">
                                    ⭐ ${repo.stars.toLocaleString()}
                                </div>
                                <div class="meta-item forks">
                                    🍴 ${repo.forks.toLocaleString()}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                contentDiv.innerHTML = `<div class="repos-grid">${reposHtml}</div>`;
            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <h2>加载失败</h2>
                        <p>请先运行 npm run scrape 抓取数据</p>
                    </div>
                `;
                console.error('Error loading data:', error);
            }
        }

        loadTrending();
    </script>
</body>
</html>
