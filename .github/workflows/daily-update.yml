name: Daily GitHub Trending Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Fetch latest trending repos and generate HTML
        run: |
          node scripts/update.js

      - name: Commit and push changes
        run: |
          git config user.name "WERLK"
          git config user.email "werlk@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update trending repos $(date +%Y-%m-%d)"
          git push origin main
